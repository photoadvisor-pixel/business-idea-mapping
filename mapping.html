<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事業アイデア マッピング（実現難易度 vs 事業規模）</title>
    <!-- Chart.js 読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
            text-align: center;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        .chart-container {
            position: relative;
            height: 60vh;
            width: 100%;
        }

        /* 四象限の背景ガイド用スタイル */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>事業アイデア・マッピング</h1>
        <p class="subtitle">縦軸：事業規模（年商） / 横軸：実現難易度（既存事業「オンライン写真教室」からの距離）<br>※右上に行くほど、規模は大きく難易度も高い</p>

        <div class="chart-wrapper">
            <div class="chart-container">
                <canvas id="businessMapChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // データの定義 (x: 実現難易度, y: 事業規模(年商))
        // 値は相対的な評価 (0〜100のスケール)
        const data = [
            { id: 1, label: 'プロカメラマンと１対１で学べる', x: 10, y: 30 },
            { id: 2, label: 'グループのスポーツ写真撮影', x: 25, y: 55 },
            { id: 3, label: 'SNS代行', x: 30, y: 40 },
            { id: 4, label: 'ウーバーカメラマン', x: 50, y: 75 },
            { id: 5, label: 'グループ向け小売(定期制)', x: 60, y: 45 },
            { id: 6, label: '地域サービス提携割引', x: 65, y: 20 },
            { id: 7, label: '美容系サロンのコンサル', x: 75, y: 60 },
            { id: 8, label: '買取屋（遺品整理など）', x: 85, y: 70 },
            { id: 9, label: '間借り唐揚げ屋', x: 95, y: 15 },
            { id: 10, label: 'サロン経営（M&A）', x: 90, y: 95 }
        ];

        // カラーパレット
        const colors = [
            'rgba(52, 152, 219, 0.8)',   // Blue
            'rgba(46, 204, 113, 0.8)',   // Green
            'rgba(155, 89, 182, 0.8)',   // Purple
            'rgba(241, 196, 15, 0.8)',   // Yellow
            'rgba(230, 126, 34, 0.8)',   // Orange
            'rgba(231, 76, 60, 0.8)',   // Red
            'rgba(26, 188, 156, 0.8)',   // Turquoise
            'rgba(52, 73, 94, 0.8)',     // Navy
            'rgba(149, 165, 166, 0.8)',  // Gray
            'rgba(211, 84, 0, 0.8)'      // Dark Orange
        ];

        // Chart.js 用のデータセット作成
        const datasets = data.map((item, index) => ({
            label: item.label,
            data: [{ x: item.x, y: item.y }],
            backgroundColor: colors[index % colors.length],
            borderColor: colors[index % colors.length].replace('0.8', '1'),
            pointRadius: 10,
            pointHoverRadius: 14,
            borderWidth: 2
        }));

        const ctx = document.getElementById('businessMapChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            font: {
                                size: 13,
                                family: "'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif"
                            },
                            usePointStyle: true,
                            padding: 20
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                return context.dataset.label;
                            }
                        },
                        titleFont: { size: 14 },
                        bodyFont: { size: 16 },
                        padding: 12,
                        backgroundColor: 'rgba(0, 0, 0, 0.8)'
                    },
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line',
                                yMin: 50,
                                yMax: 50,
                                borderColor: 'rgba(0,0,0,0.1)',
                                borderWidth: 2,
                                borderDash: [5, 5]
                            },
                            line2: {
                                type: 'line',
                                xMin: 50,
                                xMax: 50,
                                borderColor: 'rgba(0,0,0,0.1)',
                                borderWidth: 2,
                                borderDash: [5, 5]
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        min: 0,
                        max: 100,
                        title: {
                            display: true,
                            text: '実現難易度 (右ほど難しい)',
                            font: {
                                size: 14,
                                weight: 'bold'
                            },
                            padding: { top: 10 }
                        },
                        grid: {
                            color: function (context) {
                                if (context.tick.value === 50) {
                                    return 'rgba(0, 0, 0, 0.2)'; // 中央の縦線
                                }
                                return 'rgba(0, 0, 0, 0.05)';
                            },
                            lineWidth: function (context) {
                                return context.tick.value === 50 ? 2 : 1;
                            }
                        }
                    },
                    y: {
                        min: 0,
                        max: 100,
                        title: {
                            display: true,
                            text: '事業規模・年商 (上ほど大きい)',
                            font: {
                                size: 14,
                                weight: 'bold'
                            },
                            padding: { bottom: 10 }
                        },
                        grid: {
                            color: function (context) {
                                if (context.tick.value === 50) {
                                    return 'rgba(0, 0, 0, 0.2)'; // 中央の横線
                                }
                                return 'rgba(0, 0, 0, 0.05)';
                            },
                            lineWidth: function (context) {
                                return context.tick.value === 50 ? 2 : 1;
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>

</html>
